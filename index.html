<!DOCTYPE html>
<html>
  <body>
    <h2>OAuth Callback Page</h2>

    <p><b>Full URL:</b></p>
    <pre id="url"></pre>

    <p><b>Authorization Code:</b></p>
    <pre id="code"></pre>

    <script>
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");

      document.getElementById("url").innerText = window.location.href;
      document.getElementById("code").innerText = code || "No code found yet";
    </script>
  </body>
</html>
